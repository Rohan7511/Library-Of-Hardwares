<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Library of Hardware — Management System</title>
  <meta name="description" content="A role-based hardware inventory management system for educational institutions." />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <div id="login-screen" class="login-wrapper">
    <div class="login-card">
      <div class="logo">
        <img
          src="https://i0.wp.com/singularunity.com/wp-content/uploads/2024/01/Amrita-vishwa-vidyapeetham-color-logo.png?ssl=1"
          alt="Amrita Logo" style="max-height: 80px; margin: 0 auto; display: block;" />
      </div>
      <form id="login-form" autocomplete="off">
        <div class="form-group">
          <label for="login-email">Email</label>
          <input id="login-email" class="form-control" type="email" placeholder="e.g. student1@loh.edu" required />
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input id="login-password" class="form-control" type="password" placeholder="Enter password" required />
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="login-btn" style="margin-top: 20px;">Sign
          In</button>
      </form>

      <div style="margin-top: 32px; text-align: center;">
        <p style="font-size: 13px; color: var(--text-secondary); margin-bottom: 16px;">
          The Library of Hardware is a specialized management system designed to streamline the borrowing and tracking
          of electronic components and equipment for students and faculty.
        </p>
        <div
          style="font-size: 12px; color: var(--text-muted); background: var(--bg-primary); padding: 12px; border-radius: var(--radius-sm);">
          <div style="font-weight: 600; margin-bottom: 4px; color: var(--text-primary);">Developed By:</div>
          <div>Gubba Rohan, Ananta Aditya, Bhashyam Sree Darshan</div>
          
        </div>
      </div>
    </div>
  </div>

  <div id="app-shell" class="app-wrapper hidden">
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-brand">
        <img src="https://webfiles.amrita.edu/2026/02/amrita-red-logo-new.svg" alt="Amrita Logo" />
      </div>
      <nav id="sidebar-nav" class="sidebar-nav"></nav>
      <div class="sidebar-footer">
        <div class="user-info">
          <div>
            <div class="user-name" id="user-display-name">User Name</div>
            <div class="user-role" id="user-display-role" style="text-transform: capitalize;">Role</div>
          </div>
        </div>
        <button class="btn btn-outline btn-sm btn-block" id="logout-btn">⎋ Logout</button>
      </div>
    </aside>

    <main class="main-content">
      <header class="top-bar">
        <div>
          <button class="mobile-toggle" id="mobile-toggle">☰</button>
          <span class="page-title" id="page-title">Dashboard</span>
        </div>
        <div class="top-bar-actions">
          <span class="breadcrumb" id="breadcrumb"></span>
        </div>
      </header>
      <section class="content-area" id="content-area">
      </section>
    </main>
  </div>

  <div id="global-modal" class="custom-modal hidden"></div>

  <div class="toast-container" id="toast-container"></div>

  <script src="app.js"></script>
</body>

</html>
