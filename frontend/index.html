<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Library of Hardware — Management System</title>
  <meta name="description" content="A role-based hardware inventory management system for educational institutions." />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <div id="login-screen" class="login-wrapper">
    <div class="login-card">
      <div class="logo">📦 Library of Hardware</div>
      <p class="subtitle">Hardware Management System — Login</p>
      <form id="login-form" autocomplete="off">
        <div class="form-group">
          <label for="login-email">Email</label>
          <input id="login-email" class="form-control" type="email" placeholder="e.g. student1@loh.edu" required />
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input id="login-password" class="form-control" type="password" placeholder="Enter password" required />
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="login-btn" style="margin-top: 20px;">Sign In</button>
      </form>
    </div>
  </div>

  <div id="app-shell" class="app-wrapper hidden">
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-brand">📦 LibHardware</div>
      <nav id="sidebar-nav" class="sidebar-nav"></nav>
      <div class="sidebar-footer">
        <div class="user-info">
          <div>
            <div class="user-name" id="user-display-name">User Name</div>
            <div class="user-role" id="user-display-role" style="text-transform: capitalize;">Role</div>
          </div>
        </div>
        <button class="btn btn-outline btn-sm btn-block" id="logout-btn">⎋ Logout</button>
      </div>
    </aside>

    <main class="main-content">
      <header class="top-bar">
        <div>
          <button class="mobile-toggle" id="mobile-toggle">☰</button>
          <span class="page-title" id="page-title">Dashboard</span>
        </div>
        <div class="top-bar-actions">
          <span class="breadcrumb" id="breadcrumb"></span>
        </div>
      </header>
      <section class="content-area" id="content-area">
      </section>
    </main>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <script src="app.js"></script>
</body>

</html>
